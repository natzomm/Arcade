<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jeu de la cible</title>
<link rel="icon" type="image/JPG" href="logo.jpg">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{min-height:100vh;background:linear-gradient(135deg,#0f172a,#1e293b,#172554);color:white}button{border:none;cursor:pointer;border-radius:12px;font-weight:bold;transition:.2s}button:hover{transform:scale(1.04)}#page{width:100%;min-height:100vh;padding:18px}header{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;margin-bottom:18px}h1{font-size:42px}#playerBox{font-size:20px;color:#cbd5e1}.homeBtn{padding:13px 22px;font-size:18px;background:#38bdf8;color:#082f49}#main{display:grid;grid-template-columns:310px 1fr;gap:18px}.panel{background:rgba(15,23,42,.82);border:1px solid rgba(148,163,184,.25);border-radius:22px;padding:18px;box-shadow:0 20px 40px rgba(0,0,0,.25)}.panel h2{margin-bottom:12px;font-size:24px}.optionGroup{margin-bottom:22px}.optionGroup p{margin-bottom:10px;color:#cbd5e1;font-weight:bold}.choice{width:100%;padding:13px 14px;margin:6px 0;font-size:17px;background:#334155;color:white;border:2px solid transparent}.choice.selected{background:#0ea5e9;border-color:#bae6fd;color:#082f49}#startBtn{width:100%;padding:17px;font-size:23px;background:#22c55e;color:#052e16;margin-top:8px}#recordPanel{margin-top:18px;background:#020617;border-radius:18px;padding:16px;min-height:150px}#recordPanel h3{margin-bottom:10px;color:#facc15}.recordLine{margin:7px 0;color:#e2e8f0;font-size:17px}#gamePanel{position:relative;overflow:hidden}#hud{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;font-size:19px;margin-bottom:12px}.hudItem{background:#020617;padding:10px 14px;border-radius:12px;min-width:110px}#gameArea{height:68vh;min-height:430px;background:radial-gradient(circle at center,#1e293b,#020617);border-radius:22px;position:relative;overflow:hidden;border:2px solid rgba(148,163,184,.25)}.target{position:absolute;border-radius:50%;cursor:pointer;background:radial-gradient(circle,#fff 0 12%,#ef4444 13% 28%,#fff 29% 45%,#ef4444 46% 65%,#7f1d1d 66% 100%);box-shadow:0 0 22px rgba(248,113,113,.65);animation:appear .12s ease-out}.target.redStyle{background:#ef4444;box-shadow:0 0 22px rgba(248,113,113,.65)}.bomb{position:absolute;width:46px;height:46px;border-radius:50%;background:#050505;border:3px solid #525252;cursor:pointer;display:flex;justify-content:center;align-items:center;font-size:24px;box-shadow:0 0 20px rgba(0,0,0,.8);animation:appear .12s ease-out}.bomb::after{content:"💣"}.pop{animation:pop .18s forwards}.explosion{position:absolute;width:80px;height:80px;border-radius:50%;background:radial-gradient(circle,#facc15,#f97316,#dc2626,transparent);pointer-events:none;animation:boom .35s forwards;z-index:30}.floatText{position:absolute;color:#facc15;font-size:28px;font-weight:bold;pointer-events:none;animation:floatUp .7s forwards;z-index:40}#centerMessage{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:42px;font-weight:bold;color:#facc15;text-shadow:0 4px 18px rgba(0,0,0,.8);pointer-events:none;opacity:0;z-index:50}#centerMessage.show{animation:centerFlash .9s forwards}#endScreen{position:absolute;inset:0;background:rgba(2,6,23,.92);display:none;justify-content:center;align-items:center;z-index:100}#endCard{width:min(420px,90%);background:#1e293b;border:2px solid #38bdf8;border-radius:24px;padding:26px;text-align:center;box-shadow:0 25px 55px rgba(0,0,0,.45)}#endCard h2{font-size:36px;margin-bottom:16px}#endStats{font-size:20px;line-height:1.8;margin-bottom:20px}.endButtons{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.endButtons button{padding:13px 20px;font-size:18px}.restartBtn{background:#22c55e;color:#052e16}.menuBtn{background:#38bdf8;color:#082f49}@keyframes appear{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}@keyframes pop{to{transform:scale(0);opacity:0}}@keyframes boom{from{transform:scale(.2);opacity:1}to{transform:scale(2.3);opacity:0}}@keyframes floatUp{from{transform:translateY(0);opacity:1}to{transform:translateY(-55px);opacity:0}}@keyframes centerFlash{0%{opacity:0;transform:translate(-50%,-50%) scale(.7)}20%{opacity:1;transform:translate(-50%,-50%) scale(1.05)}100%{opacity:0;transform:translate(-50%,-80%) scale(1)}}.shake{animation:shake .22s}@keyframes shake{0%{transform:translate(0)}25%{transform:translate(7px,-4px)}50%{transform:translate(-7px,4px)}75%{transform:translate(5px,2px)}100%{transform:translate(0)}}@media(max-width:850px){#main{grid-template-columns:1fr}h1{font-size:34px}#gameArea{height:62vh}}
</style>
</head>
<body>
<div id="page"><header><div><h1>🎯 Jeu de la cible</h1><div id="playerBox">👤 <span id="playerName">Joueur</span></div></div><button class="homeBtn" onclick="goHome()">🏠 Accueil</button></header><div id="main"><aside class="panel"><h2>⚙️ Paramètres</h2><div class="optionGroup"><p>Mode</p><button class="choice selected" id="mode_time" onclick="selectMode('time')">⏱️ 1 minute</button><button class="choice" id="mode_noerror" onclick="selectMode('noerror')">💔Sans erreur</button></div><div class="optionGroup"><p>Difficulté</p><button class="choice selected" id="diff_easy" onclick="selectDifficulty('easy')">🟢 Facile</button><button class="choice" id="diff_medium" onclick="selectDifficulty('medium')">🟠 Moyen</button><button class="choice" id="diff_hard" onclick="selectDifficulty('hard')">🔴 Difficile</button></div><div class="optionGroup"><p>Style de cible</p><button class="choice selected" id="style_target" onclick="selectTargetStyle('target')">🎯 Vraie cible</button><button class="choice" id="style_red" onclick="selectTargetStyle('red')">🔴 Rond rouge</button></div><button id="startBtn" onclick="startGame()">▶️ COMMENCER</button><div id="recordPanel"><h3>🏆 Record actuel</h3><div id="recordContent"></div></div></aside><section class="panel" id="gamePanel"><div id="hud"><div class="hudItem">🎯 Score<br><span id="scoreDisplay">0</span></div><div class="hudItem">⏱️ Temps<br><span id="timeDisplay">0</span></div><div class="hudItem">❌ Ratés<br><span id="missDisplay">0</span></div><div class="hudItem">🔥 Combo<br><span id="comboDisplay">x1</span></div></div><div id="gameArea"><div id="centerMessage"></div><div id="endScreen"><div id="endCard"><h2 id="endTitle">FIN</h2><div id="endStats"></div><div class="endButtons"><button class="restartBtn" onclick="restartGame(event)">🔁 Rejouer</button><button class="menuBtn" onclick="showMenu(event)">⚙️ Menu</button></div></div></div></div></section></div></div>
<script>
const playerName=document.getElementById("playerName"),gameArea=document.getElementById("gameArea"),endScreen=document.getElementById("endScreen"),endStats=document.getElementById("endStats"),endTitle=document.getElementById("endTitle"),centerMessage=document.getElementById("centerMessage");playerName.innerText=localStorage.getItem("pseudo")||"Joueur";let selectedMode="time",selectedDifficulty="easy",selectedTargetStyle="target",isPlaying=false,score=0,hits=0,misses=0,clicks=0,combo=0,comboMultiplier=1,time=0,timer=null,bombTimer=null,target=null,seStartTime=0;const difficulties={easy:{label:"Facile",targetSize:78,bombChance:0,bombEvery:999999},medium:{label:"Moyen",targetSize:60,bombChance:.45,bombEvery:2100},hard:{label:"Difficile",targetSize:42,bombChance:.85,bombEvery:1250}};
function goHome(){window.location.href="index.html"}
function selectMode(mode){if(isPlaying){
    if(!confirm("Changer le mode va arrêter la partie actuelle. Continuer ?")){
        return;
    }

    showMenu();
};selectedMode=mode;document.getElementById("mode_time").classList.toggle("selected",mode==="time");document.getElementById("mode_noerror").classList.toggle("selected",mode==="noerror");updateRecordPanel()}
function selectDifficulty(diff){if(isPlaying){
    if(!confirm("Changer la difficulté va arrêter la partie actuelle. Continuer ?")){
        return;
    }

    showMenu();
};selectedDifficulty=diff;document.getElementById("diff_easy").classList.toggle("selected",diff==="easy");document.getElementById("diff_medium").classList.toggle("selected",diff==="medium");document.getElementById("diff_hard").classList.toggle("selected",diff==="hard");updateRecordPanel()}
function selectTargetStyle(style){if(isPlaying)return;selectedTargetStyle=style;document.getElementById("style_target").classList.toggle("selected",style==="target");document.getElementById("style_red").classList.toggle("selected",style==="red")}
function getRecordKey(){return"target_record_"+selectedMode+"_"+selectedDifficulty}
function updateRecordPanel(){const box=document.getElementById("recordContent"),record=JSON.parse(localStorage.getItem(getRecordKey())||"null"),modeName=selectedMode==="time"?"1 minute":"SE",diffName=difficulties[selectedDifficulty].label;if(!record){box.innerHTML=`<div class="recordLine">${modeName} - ${diffName}</div><div class="recordLine">Aucun record pour l'instant.</div>`;return}if(selectedMode==="time"){box.innerHTML=`<div class="recordLine">${modeName} - ${diffName}</div><div class="recordLine">🎯 Touches : ${record.hits}</div><div class="recordLine">❌ Ratés : ${record.misses}</div><div class="recordLine">📊 Précision : ${record.accuracy}%</div><div class="recordLine">⭐ Score : ${record.score}</div>`}else{box.innerHTML=`<div class="recordLine">${modeName} - ${diffName}</div><div class="recordLine">🎯 Touches : ${record.hits}</div><div class="recordLine">⏱️ Temps : ${record.time}s</div>`}}
function resetGame(){clearInterval(timer);clearInterval(bombTimer);timer=null;bombTimer=null;score=0;hits=0;misses=0;clicks=0;combo=0;comboMultiplier=1;time=0;target=null;document.querySelectorAll(".target,.bomb,.explosion,.floatText").forEach(el=>el.remove());updateHUD()}
function updateHUD(){document.getElementById("scoreDisplay").innerText=score;document.getElementById("timeDisplay").innerText=time;document.getElementById("missDisplay").innerText=misses;document.getElementById("comboDisplay").innerText="x"+comboMultiplier}
function startGame(){resetGame();isPlaying=true;endScreen.style.display="none";document.getElementById("startBtn").style.display="none";if(selectedMode==="time"){time=60;timer=setInterval(()=>{time--;updateHUD();if(time<=0)endGame()},1000)}else{seStartTime=Date.now();timer=setInterval(()=>{time=((Date.now()-seStartTime)/1000).toFixed(1);updateHUD()},100)}spawnTarget();startBombSystem();updateHUD()}
function spawnTarget(){if(!isPlaying)return;if(target){target.remove();target=null}const size=difficulties[selectedDifficulty].targetSize;target=document.createElement("div");target.className="target";if(selectedTargetStyle==="red")target.classList.add("redStyle");target.style.width=size+"px";target.style.height=size+"px";const x=Math.random()*(gameArea.clientWidth-size),y=Math.random()*(gameArea.clientHeight-size);target.style.left=x+"px";target.style.top=y+"px";target.onclick=e=>{e.stopPropagation();if(!isPlaying)return;hits++;clicks++;combo++;updateCombo();score+=comboMultiplier;showFloatText("+"+comboMultiplier,x,y);target.classList.add("pop");setTimeout(()=>{if(target){target.remove();target=null}spawnTarget()},120);updateHUD()};gameArea.appendChild(target)}
function updateCombo(){if(combo>=20){comboMultiplier=5;flashCenter("🔥 COMBO x5")}else if(combo>=10){comboMultiplier=3;flashCenter("🔥 COMBO x3")}else if(combo>=5){comboMultiplier=2;flashCenter("🔥 COMBO x2")}else comboMultiplier=1}
function resetCombo(){combo=0;comboMultiplier=1}
function startBombSystem(){const config=difficulties[selectedDifficulty];if(config.bombChance<=0)return;bombTimer=setInterval(()=>{if(!isPlaying)return;if(Math.random()<=config.bombChance)spawnBomb()},config.bombEvery)}
function spawnBomb(){const bomb=document.createElement("div");bomb.className="bomb";const size=46,x=Math.random()*(gameArea.clientWidth-size),y=Math.random()*(gameArea.clientHeight-size);bomb.style.left=x+"px";bomb.style.top=y+"px";bomb.onclick=e=>{e.stopPropagation();if(!isPlaying)return;createExplosion(x,y);gameArea.classList.add("shake");setTimeout(()=>gameArea.classList.remove("shake"),250);if(selectedMode==="time"){score=Math.max(0,score-3);resetCombo();showFloatText("-3",x,y);bomb.remove();updateHUD()}else endGame(true)};gameArea.appendChild(bomb);setTimeout(()=>{if(bomb.parentElement)bomb.remove()},2000)}
function createExplosion(x,y){const explosion=document.createElement("div");explosion.className="explosion";explosion.style.left=x-15+"px";explosion.style.top=y-15+"px";gameArea.appendChild(explosion);setTimeout(()=>explosion.remove(),400)}
function showFloatText(text,x,y){const el=document.createElement("div");el.className="floatText";el.innerText=text;el.style.left=x+"px";el.style.top=y+"px";gameArea.appendChild(el);setTimeout(()=>el.remove(),700)}
function flashCenter(text){centerMessage.innerText=text;centerMessage.classList.remove("show");void centerMessage.offsetWidth;centerMessage.classList.add("show")}
gameArea.addEventListener("click",()=>{if(!isPlaying)return;misses++;clicks++;resetCombo();if(selectedMode==="noerror"){endGame(false);return}updateHUD()});endScreen.addEventListener("click",e=>e.stopPropagation());
function endGame(bombDeath=false){if(!isPlaying)return;isPlaying=false;clearInterval(timer);clearInterval(bombTimer);timer=null;bombTimer=null;if(target){target.remove();target=null}document.querySelectorAll(".bomb").forEach(b=>b.remove());saveRecord();if(selectedMode==="time"){const accuracy=clicks===0?100:Math.round(hits/clicks*100);endTitle.innerText="🎉 FIN";endStats.innerHTML=`🎯 Touches : ${hits}<br>❌ Ratés : ${misses}<br>📊 Précision : ${accuracy}%<br>⭐ Score : ${score}`}else{const finalTime=((Date.now()-seStartTime)/1000).toFixed(2);endTitle.innerText=bombDeath?"💥 BOOM":"💀 GAME OVER";endStats.innerHTML=`🎯 Touches : ${hits}<br>⏱️ Temps : ${finalTime}s`}updateRecordPanel();endScreen.style.display="flex"}
function saveRecord(){const key=getRecordKey(),oldRecord=JSON.parse(localStorage.getItem(key)||"null");if(selectedMode==="time"){const accuracy=clicks===0?100:Math.round(hits/clicks*100),newRecord={score,hits,misses,accuracy};if(!oldRecord||score>oldRecord.score)localStorage.setItem(key,JSON.stringify(newRecord))}else{const finalTime=Number(((Date.now()-seStartTime)/1000).toFixed(2)),newRecord={hits,time:finalTime};if(!oldRecord||hits>oldRecord.hits||(hits===oldRecord.hits&&finalTime>oldRecord.time))localStorage.setItem(key,JSON.stringify(newRecord))}}
function restartGame(e){if(e){e.stopPropagation();e.preventDefault()}endScreen.style.display="none";setTimeout(()=>startGame(),50)}
function showMenu(e){if(e){e.stopPropagation();e.preventDefault()}isPlaying=false;clearInterval(timer);clearInterval(bombTimer);document.querySelectorAll(".target,.bomb,.explosion,.floatText").forEach(el=>el.remove());endScreen.style.display="none";document.getElementById("startBtn").style.display="block";resetGame();updateRecordPanel()}
updateRecordPanel();updateHUD();
</script>
</body>
</html>
