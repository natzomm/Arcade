<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pierre Papier Ciseaux</title>
<link rel="icon" type="image/png" href="favicon.png">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#312e81,#1e3a8a);
    color:white;
}

button{
    border:none;
    border-radius:14px;
    cursor:pointer;
    font-weight:bold;
    transition:0.2s;
}

button:hover{
    transform:scale(1.05);
}

button:disabled{
    opacity:0.5;
    cursor:not-allowed;
    transform:none;
}

header{
    padding:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:15px;
}

h1{
    font-size:42px;
}

.homeBtn{
    padding:13px 22px;
    font-size:18px;
    background:#38bdf8;
    color:#082f49;
}

#container{
    width:min(1050px,95%);
    margin:0 auto;
    display:grid;
    grid-template-columns:315px 1fr;
    gap:22px;
}

.panel{
    background:rgba(15,23,42,0.86);
    border:1px solid rgba(148,163,184,0.25);
    border-radius:24px;
    padding:22px;
    box-shadow:0 20px 45px rgba(0,0,0,0.3);
}

.statLine{
    background:#020617;
    padding:13px;
    margin:10px 0;
    border-radius:12px;
    font-size:20px;
}

.modeBtn{
    width:100%;
    padding:13px;
    margin:7px 0;
    font-size:17px;
    background:#334155;
    color:white;
    border:2px solid transparent;
}

.modeBtn.selected{
    background:#22c55e;
    color:#052e16;
    border-color:#bbf7d0;
}

.resetBtn{
    width:100%;
    padding:13px;
    margin-top:18px;
    font-size:17px;
    background:#ef4444;
    color:white;
}

#gamePanel{
    text-align:center;
}

#roundTitle{
    font-size:30px;
    color:#facc15;
    margin-bottom:18px;
    min-height:38px;
}

#scoreRound{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.roundBox{
    background:#020617;
    padding:14px 20px;
    border-radius:15px;
    font-size:22px;
    min-width:135px;
}

#arena{
    background:radial-gradient(circle,#1e293b,#020617);
    border-radius:24px;
    min-height:300px;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:45px;
    flex-wrap:wrap;
    padding:25px;
    border:2px solid rgba(148,163,184,0.25);
}

.fighter{
    width:210px;
    min-height:210px;
    background:#111827;
    border-radius:22px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border:3px solid #334155;
}

.fighterName{
    font-size:22px;
    margin-bottom:12px;
    color:#cbd5e1;
}

.hand{
    font-size:90px;
    transition:0.2s;
}

.shake{
    animation:shake 0.45s infinite;
}

@keyframes shake{
    0%{transform:rotate(0deg) translateY(0)}
    25%{transform:rotate(-10deg) translateY(-8px)}
    50%{transform:rotate(10deg) translateY(0)}
    75%{transform:rotate(-6deg) translateY(-8px)}
    100%{transform:rotate(0deg) translateY(0)}
}

#choices{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:16px;
    flex-wrap:wrap;
}

.choiceBtn{
    width:150px;
    height:120px;
    font-size:54px;
    background:#1e293b;
    color:white;
    border:3px solid #475569;
}

.choiceBtn:hover{
    border-color:#38bdf8;
    background:#334155;
}

#result{
    font-size:32px;
    font-weight:bold;
    margin-top:22px;
    min-height:42px;
}

.winText{color:#22c55e;}
.loseText{color:#ef4444;}
.drawText{color:#facc15;}

#endOverlay{
    position:fixed;
    inset:0;
    background:rgba(2,6,23,0.88);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:50;
}

#endCard{
    width:min(440px,90%);
    background:#1e293b;
    border:2px solid #38bdf8;
    border-radius:24px;
    padding:28px;
    text-align:center;
}

#endCard h2{
    font-size:38px;
    margin-bottom:16px;
}

#endCard p{
    font-size:20px;
    color:#cbd5e1;
    line-height:1.6;
}

#endCard button{
    margin-top:18px;
    padding:13px 22px;
    font-size:18px;
    background:#22c55e;
    color:#052e16;
}

.info{
    margin-top:15px;
    color:#cbd5e1;
    line-height:1.45;
    background:#020617;
    border-radius:12px;
    padding:12px;
}

@media(max-width:820px){
    #container{
        grid-template-columns:1fr;
    }

    h1{
        font-size:34px;
    }

    .fighter{
        width:160px;
        min-height:170px;
    }

    .hand{
        font-size:70px;
    }

    .choiceBtn{
        width:120px;
        height:100px;
        font-size:46px;
    }
}
</style>
</head>

<body>

<header>
    <div>
        <h1>✊✋✌️ Pierre Papier Ciseaux</h1>
        <div>👤 Joueur : <span id="player">Joueur</span></div>
    </div>

    <button class="homeBtn" onclick="goHome()">🏠 Accueil</button>
</header>

<div id="container">

<aside class="panel">
    <h2>🏆 Statistiques</h2>

    <div class="statLine">✅ Victoires : <span id="totalWins">0</span></div>
    <div class="statLine">❌ Défaites : <span id="totalLosses">0</span></div>
    <div class="statLine">🤝 Égalités : <span id="totalDraws">0</span></div>
    <div class="statLine">🔥 Série actuelle : <span id="streak">0</span></div>
    <div class="statLine">👑 Meilleure série : <span id="bestStreak">0</span></div>

    <h2 style="margin-top:25px;">🎮 Match</h2>
    <button class="modeBtn selected" id="target3" onclick="setTarget(3)">Premier à 3</button>
    <button class="modeBtn" id="target5" onclick="setTarget(5)">Premier à 5</button>
    <button class="modeBtn" id="target10" onclick="setTarget(10)">Premier à 10</button>

    <div class="info">
        Le bot choisit au hasard. Les statistiques restent sauvegardées même si tu fermes la page.
    </div>

    <button class="resetBtn" onclick="resetStats()">🔄 Reset stats</button>
</aside>

<section class="panel" id="gamePanel">
    <div id="roundTitle">Premier à 3</div>

    <div id="scoreRound">
        <div class="roundBox">Toi<br><span id="playerScore">0</span></div>
        <div class="roundBox">Bot<br><span id="botScore">0</span></div>
    </div>

    <div id="arena">
        <div class="fighter">
            <div class="fighterName">Toi</div>
            <div class="hand" id="playerHand">❔</div>
        </div>

        <div class="fighter">
            <div class="fighterName">Bot</div>
            <div class="hand" id="botHand">❔</div>
        </div>
    </div>

    <div id="choices">
        <button class="choiceBtn" onclick="play('rock')">✊</button>
        <button class="choiceBtn" onclick="play('paper')">✋</button>
        <button class="choiceBtn" onclick="play('scissors')">✌️</button>
    </div>

    <div id="result"></div>
</section>

</div>

<div id="endOverlay">
    <div id="endCard">
        <h2 id="endTitle">Fin</h2>
        <p id="endText"></p>
        <button onclick="newMatch()">Nouvelle partie</button>
    </div>
</div>

<script>
document.getElementById("player").innerText =
localStorage.getItem("pseudo") || "Joueur";

const emojis = {
    rock:"✊",
    paper:"✋",
    scissors:"✌️"
};

const names = {
    rock:"Pierre",
    paper:"Papier",
    scissors:"Ciseaux"
};

let targetScore = 3;
let playerScore = 0;
let botScore = 0;
let animating = false;

let stats = JSON.parse(localStorage.getItem("rps_stats") || '{"wins":0,"losses":0,"draws":0,"streak":0,"bestStreak":0}');

function goHome(){
    window.location.href = "index.html";
}

function saveStats(){
    localStorage.setItem("rps_stats", JSON.stringify(stats));
}

function updateStats(){
    document.getElementById("totalWins").innerText = stats.wins;
    document.getElementById("totalLosses").innerText = stats.losses;
    document.getElementById("totalDraws").innerText = stats.draws;
    document.getElementById("streak").innerText = stats.streak;
    document.getElementById("bestStreak").innerText = stats.bestStreak;

    document.getElementById("playerScore").innerText = playerScore;
    document.getElementById("botScore").innerText = botScore;
    document.getElementById("roundTitle").innerText = "Premier à " + targetScore;
}

function setTarget(n){
    if(animating) return;

    targetScore = n;

    document.getElementById("target3").classList.toggle("selected", n === 3);
    document.getElementById("target5").classList.toggle("selected", n === 5);
    document.getElementById("target10").classList.toggle("selected", n === 10);

    newMatch(false);
}

function botChoice(){
    const choices = ["rock","paper","scissors"];
    return choices[Math.floor(Math.random() * choices.length)];
}

function play(playerChoice){
    if(animating) return;

    animating = true;

    const bot = botChoice();

    document.getElementById("result").innerText = "Pierre...";
    document.getElementById("result").className = "";

    const playerHand = document.getElementById("playerHand");
    const botHand = document.getElementById("botHand");

    playerHand.innerText = "✊";
    botHand.innerText = "✊";
    playerHand.classList.add("shake");
    botHand.classList.add("shake");

    disableChoices(true);

    setTimeout(() => {
        document.getElementById("result").innerText = "Papier...";
    },400);

    setTimeout(() => {
        document.getElementById("result").innerText = "Ciseaux...";
    },800);

    setTimeout(() => {
        playerHand.classList.remove("shake");
        botHand.classList.remove("shake");

        playerHand.innerText = emojis[playerChoice];
        botHand.innerText = emojis[bot];

        const outcome = getOutcome(playerChoice, bot);
        applyOutcome(outcome, playerChoice, bot);

        animating = false;
        disableChoices(false);

        if(playerScore >= targetScore || botScore >= targetScore){
            setTimeout(endMatch, 650);
        }

    },1200);
}

function getOutcome(player, bot){
    if(player === bot) return "draw";

    if(
        (player === "rock" && bot === "scissors") ||
        (player === "paper" && bot === "rock") ||
        (player === "scissors" && bot === "paper")
    ){
        return "win";
    }

    return "lose";
}

function applyOutcome(outcome, playerChoice, bot){
    const result = document.getElementById("result");

    if(outcome === "win"){
        playerScore++;
        stats.wins++;
        stats.streak++;

        if(stats.streak > stats.bestStreak){
            stats.bestStreak = stats.streak;
        }

        result.innerText = "✅ Victoire ! " + names[playerChoice] + " bat " + names[bot];
        result.className = "winText";
    }else if(outcome === "lose"){
        botScore++;
        stats.losses++;
        stats.streak = 0;

        result.innerText = "❌ Défaite ! " + names[bot] + " bat " + names[playerChoice];
        result.className = "loseText";
    }else{
        stats.draws++;
        result.innerText = "🤝 Égalité !";
        result.className = "drawText";
    }

    saveStats();
    updateStats();
}

function endMatch(){
    const win = playerScore > botScore;

    document.getElementById("endTitle").innerText =
    win ? "🏆 Match gagné !" : "💀 Match perdu";

    document.getElementById("endText").innerHTML =
    "Score final :<br><br>Toi : " + playerScore + "<br>Bot : " + botScore;

    document.getElementById("endOverlay").style.display = "flex";
}

function newMatch(closeOverlay = true){
    playerScore = 0;
    botScore = 0;
    animating = false;

    document.getElementById("playerHand").innerText = "❔";
    document.getElementById("botHand").innerText = "❔";
    document.getElementById("result").innerText = "";

    if(closeOverlay){
        document.getElementById("endOverlay").style.display = "none";
    }

    disableChoices(false);
    updateStats();
}

function disableChoices(disabled){
    document.querySelectorAll(".choiceBtn").forEach(btn => btn.disabled = disabled);
}

function resetStats(){
    if(!confirm("Tu veux vraiment reset toutes les stats du pierre-papier-ciseaux ?")) return;

    stats = {wins:0,losses:0,draws:0,streak:0,bestStreak:0};
    saveStats();
    updateStats();
}

updateStats();
</script>

</body>
</html>
